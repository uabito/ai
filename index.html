<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI links</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        padding: 40px 20px;
      }

      main {
        margin: 0 auto;
        max-width: 760px;
      }

      header {
        align-items: flex-start;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 28px;
      }

      header img {
        height: 50px;
        width: 138px;
      }

      .subtitle {
        font-size: 1.35rem;
        font-weight: 650;
        margin-bottom: 4px;
      }

      h2 {
        margin-top: 32px;
        font-size: 1.2rem;
      }

      p {
        color: CanvasText;
        margin: 0 0 18px;
      }

      ul {
        padding-left: 22px;
      }

      li {
        margin: 10px 0;
      }

      code {
        background: color-mix(in srgb, CanvasText 8%, Canvas);
        border-radius: 4px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="./assets/itodev-logo.svg" alt="iToDEV">
        <p class="subtitle">Shared with love from iToDEV 💛</p>
        <p>A small shelf of useful prompts and skills. Scan, open, use, remix.</p>
      </header>

      <h2>From One Sentence to Context</h2>
      <ul>
        <li><a href="./f1c/skill/">Skill</a> - full Codex skill file.</li>
        <li><a href="./f1c/prompt/">Prompt</a> - full workshop prompt.</li>
        <li><a href="./f1c/short/">Short prompt</a> - compact workshop prompt.</li>
      </ul>
    </main>
  </body>
</html>
